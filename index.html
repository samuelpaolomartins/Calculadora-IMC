<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Calculadora IMC</h1>
    </header>

    <section>
        <form onsubmit="calcularImc(event)">
            <!-- O label aumenta a área clicável, ou seja, se o usuário clicar em cima do texto o foco do cursor será colocado em cima da caixa de texto -->
            <label for="altura">Insira sua altura (metros):</label>
            <!-- step="any" remove restrições para números com casas decimais -->
            <input type="number" inputmode="numeric" id="altura" placeholder="Ex: 1,77" step="any">
            <label for="peso">Insira seu peso (kg):</label>
            <input type="number" id="peso" placeholder="Ex: 65" step="any">
            <button id="calcular">Calcular</button>
        </form>
        <div id="resultado"></div>
        <div>
            <table id="imc">
                <tr>
                    <th>IMC</th>
                    <th>Classificação</th>
                </tr>
                <tr id="magreza">
                    <td>Menor que 18,5</td>
                    <td>Magreza</td>
                </tr>
                <tr id="normal">
                    <td>18,5 a 24,9</td>
                    <td>Normal</td>
                </tr>
                <tr id="sobrepeso">
                    <td>25 a 29,9</td>
                    <td>Sobrepeso</td>
                </tr>
                <tr id="obesidade-i">
                    <td>30 a 34,9</td>
                    <td>Obesidade grau I</td>
                </tr>
                <tr id="obesidade-ii">
                    <td>35 a 39,9</td>
                    <td>Obesidade grau II</td>
                </tr>
                <tr id="obesidade-iii">
                    <td>Maior que 40</td>
                    <td>Obesidade grau III</td>
                </tr>
            </table>
        </div>
    </section>

    <script src="index.js"></script>
</body>

</html>
